openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Sticker Matchbox API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: albums
    description: Album operations
  - name: user-albums
    description: User album operations
  - name: user-stickers
    description: User sticker state operations
  - name: matches
    description: Match and exchange operations
  - name: chats
    description: Chat operations
  - name: admin
    description: Admin operations
  - name: settings
    description: App settings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with nickname and PIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/nudge:
    get:
      operationId: getMyNudge
      tags: [me]
      summary: Get the pending (unseen) donation invite for the current user
      responses:
        "200":
          description: Pending invite, or null if none
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyNudge"

  /me/nudge/seen:
    post:
      operationId: markMyNudgeSeen
      tags: [me]
      summary: Mark the current user's invite as seen (one-shot)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [dona, condividi]
                  description: Tipo da marcare come visto (omesso = tutti i pendenti)
      responses:
        "200":
          description: Marked as seen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ALBUMS
  /albums:
    get:
      operationId: listAlbums
      tags: [albums]
      summary: List all published albums
      responses:
        "200":
          description: Albums list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Album"
    post:
      operationId: createAlbum
      tags: [albums]
      summary: Admin create album
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAlbumBody"
      responses:
        "201":
          description: Album created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"

  /albums/{albumId}:
    get:
      operationId: getAlbum
      tags: [albums]
      summary: Get album with stickers
      parameters:
        - name: albumId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Album with stickers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlbumWithStickers"
    put:
      operationId: updateAlbum
      tags: [albums]
      summary: Admin update album
      parameters:
        - name: albumId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAlbumBody"
      responses:
        "200":
          description: Album updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"

  /albums/{albumId}/publish:
    patch:
      operationId: toggleAlbumPublish
      tags: [albums]
      summary: Admin publish/unpublish album
      parameters:
        - name: albumId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishBody"
      responses:
        "200":
          description: Album publish state updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"

  /albums/{albumId}/stickers:
    get:
      operationId: listAlbumStickers
      tags: [albums]
      summary: Get all stickers for an album
      parameters:
        - name: albumId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stickers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sticker"
    post:
      operationId: batchInsertStickers
      tags: [albums]
      summary: Admin batch insert stickers from text list
      parameters:
        - name: albumId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchStickersBody"
      responses:
        "201":
          description: Stickers inserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchStickersResponse"

  /albums/{albumId}/stickers/{stickerId}:
    put:
      operationId: updateSticker
      tags: [albums]
      summary: Admin update a sticker
      parameters:
        - name: albumId
          in: path
          required: true
          schema:
            type: integer
        - name: stickerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStickerBody"
      responses:
        "200":
          description: Sticker updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sticker"

  # USER ALBUMS
  /user/albums:
    get:
      operationId: getUserAlbums
      tags: [user-albums]
      summary: Get current user's albums with stats
      responses:
        "200":
          description: User albums
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserAlbumWithStats"

  /user/albums/{albumId}:
    post:
      operationId: addAlbumToUser
      tags: [user-albums]
      summary: Add album to user profile
      parameters:
        - name: albumId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Album added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    delete:
      operationId: removeAlbumFromUser
      tags: [user-albums]
      summary: Remove album from user profile
      parameters:
        - name: albumId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Album removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # USER STICKERS
  /user/albums/{albumId}/stickers:
    get:
      operationId: getUserAlbumStickers
      tags: [user-stickers]
      summary: Get user's sticker states for an album
      parameters:
        - name: albumId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User sticker states
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSticker"

  /user/albums/{albumId}/stickers/bulk:
    post:
      operationId: bulkSetUserStickers
      tags: [user-stickers]
      summary: Set all stickers of an album to a single state (overwrites)
      description: >
        Sets every sticker of this album to the given state
        (posseduta | doppia | mancante) for the current user, overwriting the
        current selections ("mancante" resets the album). Only rows whose state
        actually differs are updated. Confirmed in the UI; reversible by the user.
      parameters:
        - name: albumId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkSetStickersBody"
      responses:
        "200":
          description: Stickers updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkSetStickersResponse"

  /user/albums/{albumId}/stickers/{stickerId}:
    patch:
      operationId: updateUserStickerState
      tags: [user-stickers]
      summary: Update sticker state (cycle mancante/posseduta/doppia)
      parameters:
        - name: albumId
          in: path
          required: true
          schema:
            type: integer
        - name: stickerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStickerStateBody"
      responses:
        "200":
          description: State updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSticker"

  # MATCHES
  /matches:
    get:
      operationId: getBestMatches
      tags: [matches]
      summary: Get best matches sorted by exchange count
      responses:
        "200":
          description: Best matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchSummary"

  /matches/nearby:
    get:
      operationId: getNearbyMatches
      tags: [matches]
      summary: Get nearby matches filtered by distance
      parameters:
        - name: radius
          in: query
          description: Raggio di ricerca in km (1-100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        "200":
          description: Nearby matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchSummary"

  /matches/by-sticker/{stickerId}:
    get:
      operationId: getMatchesBySticker
      tags: [matches]
      summary: Get users who have this single sticker as a duplicate
      parameters:
        - name: stickerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Users offering this sticker as a duplicate, sorted by distance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchSummary"

  /matches/{userId}:
    get:
      operationId: getMatchDetail
      tags: [matches]
      summary: Get detailed match with a user (multi-album)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Match detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchDetail"

  # CHATS
  /chats:
    get:
      operationId: listChats
      tags: [chats]
      summary: Get user's chats
      responses:
        "200":
          description: Chats list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Chat"
    post:
      operationId: openChat
      tags: [chats]
      summary: Open or get chat with another user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenChatBody"
      responses:
        "200":
          description: Chat opened or retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"

  /chats/{chatId}:
    delete:
      operationId: deleteChat
      tags: [chats]
      summary: Delete a chat for the current user (soft-delete, WhatsApp-style)
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chat deleted for the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /chats/{chatId}/messages:
    get:
      operationId: getChatMessages
      tags: [chats]
      summary: Get messages for a chat
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [chats]
      summary: Send a message
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /chats/{chatId}/report:
    post:
      operationId: reportChat
      tags: [chats]
      summary: Report a chat or user
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportBody"
      responses:
        "201":
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /chats/{chatId}/trade:
    get:
      operationId: getChatTrade
      tags: [chats]
      summary: Proposta di scambio per la coppia di questa chat + stato conferme
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trade breakdown e conferme
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatTrade"

  /chats/{chatId}/trade/confirm:
    post:
      operationId: confirmChatTrade
      tags: [chats]
      summary: Conferma scambio concluso (aggiorna solo il proprio album)
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmTradeBody"
      responses:
        "200":
          description: Scambio confermato e album aggiornato
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmTradeResponse"

  /chats/unread-count:
    get:
      operationId: getUnreadChatsCount
      tags: [chats]
      summary: Get number of chats with unread messages
      responses:
        "200":
          description: Unread chats count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadCountResponse"

  # ADMIN
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get dashboard stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/donations:
    get:
      operationId: getAdminDonations
      tags: [admin]
      summary: Ko-fi donations summary and list (read-only)
      responses:
        "200":
          description: Donations summary and list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDonations"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/users/{userId}/block:
    patch:
      operationId: toggleBlockUser
      tags: [admin]
      summary: Block or unblock a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockUserBody"
      responses:
        "200":
          description: Block status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/users/{userId}/nudge:
    post:
      operationId: nudgeUser
      tags: [admin]
      summary: Send a gentle invite to a user (donation or share the app)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [dona, condividi]
                  description: Tipo di invito (default dona)
      responses:
        "200":
          description: Invite sent (or re-armed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NudgeResult"

  /admin/nudge-all:
    post:
      operationId: nudgeAll
      tags: [admin]
      summary: Send/re-arm an invite (donation or share) to all non-blocked users
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [dona, condividi]
                  description: Tipo di invito (default dona)
      responses:
        "200":
          description: Broadcast done
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  type:
                    type: string
                    enum: [dona, condividi]
                  count:
                    type: integer
                    description: Numero di utenti raggiunti
                required: [success, count]

  /admin/resources:
    get:
      operationId: getResources
      tags: [admin]
      summary: Free-tier resource usage (DB size %, users, latency)
      responses:
        "200":
          description: Resource usage snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceUsage"

  /admin/chats:
    get:
      operationId: adminListChats
      tags: [admin]
      summary: List all chats
      responses:
        "200":
          description: All chats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminChat"

  /admin/chats/{chatId}/close:
    patch:
      operationId: closeChat
      tags: [admin]
      summary: Close a problematic chat
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chat closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/chats/{chatId}/messages:
    get:
      operationId: adminGetChatMessages
      tags: [admin]
      summary: Admin view chat messages
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

  /admin/reports:
    get:
      operationId: adminListReports
      tags: [admin]
      summary: List all reports
      responses:
        "200":
          description: Reports list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"

  # SETTINGS
  /settings:
    get:
      operationId: getAppSettings
      tags: [settings]
      summary: Get app settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"
    put:
      operationId: updateAppSettings
      tags: [settings]
      summary: Admin update settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppSettings"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    ResourceUsage:
      type: object
      description: Uso risorse free tier (per il monitor admin)
      properties:
        db:
          type: object
          properties:
            usedBytes: { type: integer }
            limitBytes: { type: integer }
            percent: { type: number }
            level: { type: string, enum: [green, yellow, red] }
          required: [usedBytes, limitBytes, percent, level]
        users:
          type: object
          properties:
            count: { type: integer }
            softLimit: { type: integer }
            percent: { type: number }
            level: { type: string, enum: [green, yellow, red] }
          required: [count, softLimit, percent, level]
        latencyMs: { type: integer }
        timestamp: { type: string }
      required: [db, users, latencyMs, timestamp]

    NudgeResult:
      type: object
      description: Esito dell'invio di un invito (dona o condividi), lato admin
      properties:
        success:
          type: boolean
        type:
          type: string
          enum: [dona, condividi]
          description: Tipo di invito inviato
        nudgeSentAt:
          type: string
        nudgeSeenAt:
          type: string
          nullable: true
      required: [success, nudgeSentAt]

    MyNudge:
      type: object
      description: Invito in attesa per l'utente corrente (null se nessuno)
      properties:
        nudge:
          type: object
          nullable: true
          properties:
            type:
              type: string
              enum: [dona, condividi]
              description: Tipo di invito da mostrare (dona = donazione, condividi = condividi l'app)
            sentAt:
              type: string
          required: [type, sentAt]
      required: [nudge]

    RegisterBody:
      type: object
      properties:
        nickname:
          type: string
        pin:
          type: string
        cap:
          type: string
        securityQuestion:
          type: string
        securityAnswer:
          type: string
      required: [nickname, pin, cap, securityQuestion, securityAnswer]

    LoginBody:
      type: object
      properties:
        nickname:
          type: string
        pin:
          type: string
        cap:
          type: string
      required: [nickname, pin]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserProfile"
        token:
          type: string
      required: [user, token]

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        nickname:
          type: string
        cap:
          type: string
        area:
          type: string
        exchangesCompleted:
          type: integer
        isAdmin:
          type: boolean
        underReview:
          type: boolean
          description: Esiste almeno una segnalazione pendente a carico dell'utente. Mostra un avviso generico "conversazioni sotto revisione" senza rivelare chi ha segnalato.
        createdAt:
          type: string
      required: [id, nickname, cap, exchangesCompleted, isAdmin]

    Album:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        totalStickers:
          type: integer
        isPublished:
          type: boolean
        category:
          type: string
          description: Categoria master (mondiali/europei/campionato…). Vedi ALBUM_CATEGORIES.
        userCount:
          type: integer
          description: Solo lato admin — utenti che hanno l'album tra "I miei album".
        createdAt:
          type: string
      required: [id, title, totalStickers, isPublished, category]

    AlbumWithStickers:
      allOf:
        - $ref: "#/components/schemas/Album"
        - type: object
          properties:
            stickers:
              type: array
              items:
                $ref: "#/components/schemas/Sticker"
          required: [stickers]

    Sticker:
      type: object
      properties:
        id:
          type: integer
        albumId:
          type: integer
        number:
          type: integer
        code:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
      required: [id, albumId, number, code, name]

    CreateAlbumBody:
      type: object
      properties:
        title:
          type: string
        isPublished:
          type: boolean
        category:
          type: string
          description: Categoria master (mondiali/europei/campionato…). Default campionato.
      required: [title]

    PublishBody:
      type: object
      properties:
        isPublished:
          type: boolean
      required: [isPublished]

    BatchStickersBody:
      type: object
      properties:
        rawList:
          type: string
          description: "Numbered list, one per line: '1 Messi' or '1. Messi'"
        stickers:
          type: array
          items:
            $ref: "#/components/schemas/UpdateStickerBody"
      required: []

    BatchStickersResponse:
      type: object
      properties:
        inserted:
          type: integer
        stickers:
          type: array
          items:
            $ref: "#/components/schemas/Sticker"
      required: [inserted, stickers]

    UpdateStickerBody:
      type: object
      properties:
        number:
          type: integer
        name:
          type: string
        description:
          type: string
      required: [number, name]

    UserAlbumWithStats:
      allOf:
        - $ref: "#/components/schemas/Album"
        - type: object
          properties:
            owned:
              type: integer
            missing:
              type: integer
            duplicates:
              type: integer
            completionPercent:
              type: number
            addedAt:
              type: string
          required: [owned, missing, duplicates, completionPercent]

    UserSticker:
      type: object
      properties:
        stickerId:
          type: integer
        albumId:
          type: integer
        state:
          type: string
          enum: [mancante, posseduta, doppia]
        number:
          type: integer
        code:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
      required: [stickerId, albumId, state, number, code, name]

    UpdateStickerStateBody:
      type: object
      properties:
        state:
          type: string
          enum: [mancante, posseduta, doppia]
      required: [state]

    BulkSetStickersBody:
      type: object
      properties:
        state:
          type: string
          enum: [mancante, posseduta, doppia]
      required: [state]

    BulkSetStickersResponse:
      type: object
      properties:
        updated:
          type: integer
          description: Number of stickers whose state actually changed
      required: [updated]

    MatchSummary:
      type: object
      properties:
        userId:
          type: integer
        nickname:
          type: string
        area:
          type: string
        cap:
          type: string
        totalExchanges:
          type: integer
        distanceKm:
          type: number
          nullable: true
        exchangesCompleted:
          type: integer
        albumsInCommon:
          type: integer
      required: [userId, nickname, totalExchanges, exchangesCompleted, albumsInCommon]

    MatchAlbumGroup:
      type: object
      properties:
        albumId:
          type: integer
        albumTitle:
          type: string
        stickers:
          type: array
          items:
            $ref: "#/components/schemas/Sticker"
      required: [albumId, albumTitle, stickers]

    MatchDetail:
      type: object
      properties:
        userId:
          type: integer
        nickname:
          type: string
        area:
          type: string
        totalExchanges:
          type: integer
        totalGive:
          type: integer
        totalReceive:
          type: integer
        distanceKm:
          type: number
          nullable: true
        exchangesCompleted:
          type: integer
        give:
          type: array
          items:
            $ref: "#/components/schemas/MatchAlbumGroup"
        receive:
          type: array
          items:
            $ref: "#/components/schemas/MatchAlbumGroup"
      required: [userId, nickname, totalExchanges, totalGive, totalReceive, exchangesCompleted, give, receive]

    ChatTrade:
      type: object
      properties:
        otherUserId:
          type: integer
        otherUserNickname:
          type: string
        totalGive:
          type: integer
        totalReceive:
          type: integer
        give:
          type: array
          items:
            $ref: "#/components/schemas/MatchAlbumGroup"
        receive:
          type: array
          items:
            $ref: "#/components/schemas/MatchAlbumGroup"
        myConfirmedAt:
          type: string
          nullable: true
          description: Quando l'utente corrente ha confermato lo scambio (null se non ancora).
        otherConfirmedAt:
          type: string
          nullable: true
          description: Quando l'altro utente ha confermato (null se non ancora).
      required: [otherUserId, otherUserNickname, totalGive, totalReceive, give, receive]

    ConfirmTradeBody:
      type: object
      properties:
        giveStickerIds:
          type: array
          items:
            type: integer
          description: Id delle figurine cedute (doppie mie). Filtrate lato server contro lo scambio valido.
        receiveStickerIds:
          type: array
          items:
            type: integer
          description: Id delle figurine ricevute (mancanti mie). Filtrate lato server contro lo scambio valido.
      required: [giveStickerIds, receiveStickerIds]

    ConfirmTradeResponse:
      type: object
      properties:
        success:
          type: boolean
        givenApplied:
          type: integer
        receivedApplied:
          type: integer
        exchangesCompleted:
          type: integer
      required: [success, givenApplied, receivedApplied, exchangesCompleted]

    Chat:
      type: object
      properties:
        id:
          type: integer
        otherUserId:
          type: integer
        otherUserNickname:
          type: string
        otherUserArea:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, closed]
        lastMessage:
          type: string
          nullable: true
        lastMessageAt:
          type: string
          nullable: true
        unreadCount:
          type: integer
        createdAt:
          type: string
      required: [id, otherUserId, otherUserNickname, status, unreadCount]

    OpenChatBody:
      type: object
      properties:
        otherUserId:
          type: integer
      required: [otherUserId]

    Message:
      type: object
      properties:
        id:
          type: integer
        chatId:
          type: integer
        senderId:
          type: integer
        senderNickname:
          type: string
        text:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
      required: [id, chatId, senderId, senderNickname, text, isRead, createdAt]

    SendMessageBody:
      type: object
      properties:
        text:
          type: string
      required: [text]

    ReportBody:
      type: object
      properties:
        reason:
          type: string
        reportedUserId:
          type: integer
      required: [reason, reportedUserId]

    UnreadCountResponse:
      type: object
      properties:
        count:
          type: integer
      required: [count]

    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        totalAlbums:
          type: integer
        totalMessages:
          type: integer
        activeChats:
          type: integer
        blockedUsers:
          type: integer
        pendingReports:
          type: integer
      required: [totalUsers, totalAlbums, totalMessages, activeChats, blockedUsers, pendingReports]

    AdminDonation:
      type: object
      properties:
        id:
          type: string
        fromName:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
        amount:
          type: string
        currency:
          type: string
        type:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, amount, currency, createdAt]

    AdminDonations:
      type: object
      properties:
        summary:
          type: object
          properties:
            total:
              type: string
            count:
              type: integer
            average:
              type: string
            lastAt:
              type: string
              nullable: true
            currency:
              type: string
          required: [total, count, average, currency]
        donations:
          type: array
          items:
            $ref: "#/components/schemas/AdminDonation"
      required: [summary, donations]

    AdminUser:
      type: object
      properties:
        id:
          type: integer
        nickname:
          type: string
        cap:
          type: string
        area:
          type: string
          nullable: true
        albumCount:
          type: integer
        albumTitles:
          type: array
          items:
            type: string
          description: Titoli degli album in collezione dell'utente
        ownedCount:
          type: integer
          description: Figurine segnate "possedute" (le sue). 0 con albumCount>0 = album non gestito.
        duplicatesCount:
          type: integer
          description: Figurine segnate "doppie" (pronte allo scambio).
        donationCount:
          type: integer
        donationTotal:
          type: string
        donationCurrency:
          type: string
        donations:
          type: array
          items:
            type: object
            properties:
              amount:
                type: string
              currency:
                type: string
              message:
                type: string
                nullable: true
              createdAt:
                type: string
            required: [amount, currency, createdAt]
        nudgeSentAt:
          type: string
          nullable: true
          description: Quando l'admin ha inviato l'invito a donare (null = mai invitato)
        nudgeSeenAt:
          type: string
          nullable: true
          description: Quando l'utente ha visto l'invito a donare (null = non ancora visto)
        shareSentAt:
          type: string
          nullable: true
          description: Quando l'admin ha inviato l'invito a condividere l'app (null = mai)
        shareSeenAt:
          type: string
          nullable: true
          description: Quando l'utente ha visto l'invito a condividere (null = non ancora)
        exchangesCompleted:
          type: integer
        isBlocked:
          type: boolean
        createdAt:
          type: string
      required: [id, nickname, cap, albumCount, albumTitles, ownedCount, duplicatesCount, donationCount, donationTotal, donationCurrency, donations, exchangesCompleted, isBlocked]

    BlockUserBody:
      type: object
      properties:
        isBlocked:
          type: boolean
        reason:
          type: string
      required: [isBlocked]

    AdminChat:
      type: object
      properties:
        id:
          type: integer
        user1Nickname:
          type: string
        user2Nickname:
          type: string
        status:
          type: string
          enum: [active, closed]
        messageCount:
          type: integer
        hasReport:
          type: boolean
        reportReason:
          type: string
          nullable: true
          description: Motivo dell'ultima segnalazione (categoria + eventuali note).
        createdAt:
          type: string
      required: [id, user1Nickname, user2Nickname, status, messageCount, hasReport]

    Report:
      type: object
      properties:
        id:
          type: integer
        reporterNickname:
          type: string
        reportedUserNickname:
          type: string
        chatId:
          type: integer
          nullable: true
        reason:
          type: string
        status:
          type: string
          enum: [pending, reviewed, resolved]
        createdAt:
          type: string
      required: [id, reporterNickname, reportedUserNickname, reason, status, createdAt]

    AppSettings:
      type: object
      properties:
        supportEmail:
          type: string
        appName:
          type: string
        privacyPolicyText:
          type: string
        termsText:
          type: string
        cookiePolicyText:
          type: string
        guideMode:
          type: string
          enum: [off, first, always]
          description: >
            Modalità della guida interattiva (globale, decisa da admin): 'off' =
            disattivata, 'first' = solo alla prima autenticazione, 'always' = a
            ogni refresh. Default 'off'.
      required: [supportEmail, appName]
