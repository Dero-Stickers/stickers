services:
  - type: web
    name: stickers-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: corepack pnpm install --frozen-lockfile=false && corepack pnpm --filter @workspace/stickers-app run build && corepack pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: SUPABASE_DATABASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 8080
