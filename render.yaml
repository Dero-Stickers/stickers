services:
  - type: web
    name: stickers-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm@10.26.1 && pnpm install --frozen-lockfile=false && pnpm --filter @workspace/stickers-app build && pnpm --filter @workspace/api-server build
    startCommand: pnpm --filter @workspace/api-server run start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: SUPABASE_DATABASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 8080
