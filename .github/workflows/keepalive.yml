name: Keep Supabase + Render Awake

# Pinga ogni giorno l'endpoint di produzione /api/healthz/db.
# - Sveglia il web service Render free (che si spegne dopo ~15 min di inattività)
# - Esegue un SELECT 1 su Supabase per azzerare il timer di pausa a 7 giorni
#
# URL: usa il secret PROD_URL se impostato (override senza toccare il codice),
# altrimenti il dominio custom stabile stickers.deroarts.com. In caso di
# fallimento tenta anche l'URL onrender diretto (fallback di secondo livello).
# NB: mai puntare a stickers-api.onrender.com (URL storico, oggi 404).

on:
  schedule:
    - cron: "17 6 * * *"    # ogni giorno alle 06:17 UTC (orario spostato per evitare picchi)
  workflow_dispatch:         # esecuzione manuale dal tab Actions

# Evita run sovrapposti (non servono: uno al giorno basta).
concurrency:
  group: keepalive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping /api/healthz/db
        run: |
          set -euo pipefail
          PRIMARY="${{ secrets.PROD_URL }}"
          if [ -z "$PRIMARY" ]; then
            PRIMARY="https://stickers.deroarts.com"
          fi
          FALLBACK="https://stickers-matchbox.onrender.com"

          ping_url() {
            # Render free può metterci 30-60s a svegliarsi → fino a 90s, con retry
            curl --fail --show-error --silent --max-time 90 \
                 --retry 3 --retry-delay 20 \
                 "$1/api/healthz/db" -o response.json
          }

          echo "Ping primario: $PRIMARY/api/healthz/db"
          if ping_url "$PRIMARY"; then
            echo "OK (primario)"
          else
            echo "Primario fallito, provo il fallback: $FALLBACK/api/healthz/db"
            ping_url "$FALLBACK"
            echo "OK (fallback)"
          fi

          echo "--- Risposta:"
          cat response.json
          echo
