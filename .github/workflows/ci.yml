name: CI

# Typecheck + build on every push and PR to main.
# Pure quality gate — does NOT deploy (Render handles deploy via autoDeploy).
#
# Notes (project-specific):
# - pnpm-lock.yaml is gitignored → we MUST use --frozen-lockfile=false and
#   cannot use setup-node's `cache: pnpm` (it looks for the missing lockfile).
# - vite.config.ts throws if PORT / BASE_PATH are unset → exported below.
#   These are build-time placeholders, not secrets.
# - VITE_SUPABASE_* are read at runtime, so they are not needed to build.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BASE_PATH: "/"
      PORT: "8080"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack (pnpm from packageManager)
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Typecheck + build
        run: pnpm build
