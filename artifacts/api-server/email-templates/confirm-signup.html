<!--
  Template Supabase → "Confirm signup". Minimale, brandizzato Stickers, italiano.
  Variabile usata: {{ .ConfirmationURL }} (link di conferma generato da Supabase).
  Da incollare in: Supabase → Authentication → Emails → Templates → Confirm signup.
-->
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f1f5fb;padding:32px 0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
  <tr><td align="center">
    <table width="100%" style="max-width:440px;background:#ffffff;border-radius:16px;padding:32px;border:1px solid #e5e9f0;">
      <tr><td align="center" style="padding-bottom:8px;">
        <span style="font-size:24px;font-weight:800;color:#1a2d45;let-spacing:.5px;">STICKER<span style="color:#e0a82e;">S</span></span>
      </td></tr>
      <tr><td align="center" style="font-size:18px;font-weight:700;color:#1a2d45;padding:8px 0 4px;">
        Conferma la tua email
      </td></tr>
      <tr><td align="center" style="font-size:14px;color:#5b6b80;line-height:1.5;padding-bottom:24px;">
        Tocca il pulsante qui sotto per attivare il tuo account e iniziare a scambiare figurine.
      </td></tr>
      <tr><td align="center" style="padding-bottom:24px;">
        <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#e0a82e;color:#1a2d45;font-weight:700;font-size:15px;text-decoration:none;padding:13px 32px;border-radius:10px;">
          Conferma email
        </a>
      </td></tr>
      <tr><td align="center" style="font-size:12px;color:#94a3b8;line-height:1.5;">
        Se non hai creato un account su Stickers, ignora questa email.
      </td></tr>
    </table>
    <table width="100%" style="max-width:440px;"><tr><td align="center" style="font-size:11px;color:#b0bcca;padding-top:16px;">
      Stickers · scambia figurine vicino a te
    </td></tr></table>
  </td></tr>
</table>
