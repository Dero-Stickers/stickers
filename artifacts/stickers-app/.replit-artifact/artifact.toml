kind = "web"
previewPath = "/"
title = "Stickers — matchbox"
version = "1.0.0"
id = "artifacts/stickers-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18931

[services.development]
run = "pnpm --filter @workspace/stickers-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stickers-app", "run", "build" ]
publicDir = "artifacts/stickers-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18931"
BASE_PATH = "/"
